                finally { setSubmitting(false); setAction(null); setComment(''); }
            };

            return (
                <div className="approval-card">
                    <div className="approval-header">
                        <div>
                            <div className="approval-story-id">{approval.story_id}</div>
                            <div className="approval-title">{approval.story_title}</div>
                        </div>
                        <span className="gate-badge" style={{background: gateColors[approval.gate_name] || '#64748b'}}>
                            {gateLabels[approval.gate_name] || approval.gate_name.replace(/_/g, ' ')}
                        </span>
                    </div>
                    <div className="approval-meta">
                        <span>🕐 {relativeTime(approval.requested_at)}</span>
                        <StateBadge state={approval.story_state} />
                    </div>
                    {approval.context && (
                        <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,padding:12,marginBottom:12,fontSize:13,color:'#334155'}}>{approval.context}</div>
                    )}
                    {!action ? (
                        <div className="approval-actions">
                            <button className="btn btn-success" style={{flex:1}} onClick={() => setAction('approve')}>✓ Approve</button>
                            <button className="btn btn-danger" style={{flex:1}} onClick={() => setAction('reject')}>✕ Reject</button>
                        </div>
                    ) : (
                        <div style={{marginTop:12}}>
                            <textarea className="form-textarea" placeholder="Add a note (optional)" value={comment} onChange={e => setComment(e.target.value)} style={{minHeight:70}} />
                            <div style={{display:'flex',gap:8,marginTop:10}}>
                                <button className="btn btn-primary" style={{flex:1}} onClick={handleSubmit} disabled={submitting}>{submitting ? 'Sending...' : 'Confirm'}</button>
                                <button className="btn btn-secondary" onClick={() => { setAction(null); setComment(''); }}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ══════════════════════════════════════════════════════════
           ACTIVITY LOG
           ══════════════════════════════════════════════════════════ */
        function ActivityPage({ showToast }) {
            const [activities, setActivities] = useState([]);
            const [typeFilter, setTypeFilter] = useState('');
            const [storyFilter, setStoryFilter] = useState('');
            const [dateFilter, setDateFilter] = useState('all');
            const [loading, setLoading] = useState(true);
            const [offset, setOffset] = useState(0);

            useEffect(() => {
                (async () => {
                    try {
                        setLoading(true);
                        const p = new URLSearchParams();
                        if (typeFilter) p.append('type', typeFilter);
                        if (storyFilter) p.append('story_id', storyFilter);
                        p.append('limit', '50'); p.append('offset', offset);
                        const d = await apiCall('GET', `/activity?${p}`);
                        setActivities(Array.isArray(d) ? d : d.activities || []);
                    } catch { showToast('Error', 'Could not load activity', 'error'); }
                    finally { setLoading(false); }
                })();
            }, [typeFilter, storyFilter, dateFilter, offset]);

            const typeLabels = {
                instruction_submitted: 'Request Submitted', state_changed: 'Status Changed', approval_requested: 'Approval Needed',
                approval_decided: 'Approval Given', iteration_started: 'Work Started', iteration_completed: 'Work Round Done',
                error_occurred: 'Error', story_completed: 'Completed', story_failed: 'Failed',
                file_changed: 'File Changed', test_run: 'Tests Run', code_reviewed: 'Code Reviewed', human_feedback: 'Feedback'
            };

            return (
                <div className="content"><div className="content-inner">
                    <div className="page-title">Activity Log</div>
                    <div className="page-subtitle">Everything that's happened across all your requests</div>

                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:12,marginBottom:24}}>
                        <div>
                            <label className="form-label">Filter by Type</label>
                            <select className="form-select" value={typeFilter} onChange={e => { setTypeFilter(e.target.value); setOffset(0); }}>
                                <option value="">All Events</option>
                                {Object.entries(typeLabels).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="form-label">Filter by Request</label>
                            <input type="text" className="form-input" placeholder="Search by ID..." value={storyFilter} onChange={e => { setStoryFilter(e.target.value); setOffset(0); }} />
                        </div>
                        <div>
                            <label className="form-label">Time Period</label>
                            <select className="form-select" value={dateFilter} onChange={e => { setDateFilter(e.target.value); setOffset(0); }}>
                                <option value="all">All Time</option>
                                <option value="today">Today</option>
                                <option value="week">Last 7 Days</option>
                            </select>
                        </div>
                    </div>

                    {loading ? <div style={{textAlign:'center',color:'#94a3b8',padding:24}}>Loading...</div>
                    : activities.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-icon">📋</div>
                            <div className="empty-title">No activity found</div>
                            <div className="empty-desc">Try adjusting your filters or submit a new request to see activity here.</div>
                        </div>
                    ) : (
                        <div className="card">
                            {activities.map((a, i) => (
                                <div key={i} className="activity-item">
                                    <div className="activity-icon">{ACTIVITY_ICONS[a.type] || '•'}</div>
                                    <div className="activity-content">
                                        <div className="activity-title">{a.title}</div>
                                        <div className="activity-detail">{a.detail}</div>
                                        <div className="activity-time">
                                            {a.story_id && <a className="activity-link" href="#" onClick={e => e.preventDefault()}>{a.story_id}</a>}
                                            {' '}{new Date(a.timestamp).toLocaleString()}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {activities.length >= 50 && (
                                <button className="btn btn-secondary btn-full" style={{marginTop:16}} onClick={() => setOffset(offset + 50)}>Load More</button>
                            )}
                        </div>
                    )}
                </div></div>
            );
        }

        /* ══════════════════════════════════════════════════════════
           FEEDBACK
           ══════════════════════════════════════════════════════════ */
        function FeedbackPage({ showToast }) {
            const [stories, setStories] = useState([]);
            const [selectedStory, setSelectedStory] = useState('');
            const [feedbackType, setFeedbackType] = useState('guidance');
            const [message, setMessage] = useState('');
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);

            useEffect(() => {
                (async () => {
                    try { setLoading(true); const d = await apiCall('GET', '/instructions'); setStories(Array.isArray(d) ? d : d.instructions || []); }
                    catch { showToast('Error', 'Could not load requests', 'error'); }
                    finally { setLoading(false); }
                })();
            }, []);

            useEffect(() => {
                if (selectedStory) {
                    (async () => {
                        try { const d = await apiCall('GET', `/feedback/${selectedStory}`); setHistory(Array.isArray(d) ? d : d.feedback || []); }
                        catch { setHistory([]); }
                    })();
                }
            }, [selectedStory]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!selectedStory || !message.trim()) { showToast('Missing Info', 'Please pick a request and write a message', 'error'); return; }
                try {
                    setSubmitting(true);
                    await apiCall('POST', '/feedback', { story_id: selectedStory, feedback_type: feedbackType, message });
                    showToast('Sent!', 'Your feedback was sent to the agent', 'success');
                    setMessage(''); setFeedbackType('guidance');
                    const d = await apiCall('GET', `/feedback/${selectedStory}`);
                    setHistory(Array.isArray(d) ? d : d.feedback || []);
                } catch { showToast('Error', 'Could not send feedback', 'error'); }
                finally { setSubmitting(false); }
            };

            const feedbackTypes = [
                { v: 'guidance', icon: '💡', l: 'Guidance', d: 'Point the agent in the right direction' },
                { v: 'correction', icon: '✏️', l: 'Correction', d: 'Something needs to be changed' },
                { v: 'approval', icon: '✅', l: 'Looks Good', d: 'Confirm the agent is on track' },
                { v: 'abort', icon: '🛑', l: 'Stop Work', d: 'Cancel this request' }
            ];

            return (
                <div className="content"><div className="content-inner">
                    <div className="page-title">Send Feedback</div>
                    <div className="page-subtitle">Guide the agent while it works on your requests</div>

                    <form onSubmit={handleSubmit} style={{maxWidth:600,marginBottom:32}}>
                        <div className="form-group">
                            <label className="form-label">Which request?</label>
                            <select className="form-select" value={selectedStory} onChange={e => setSelectedStory(e.target.value)}>
                                <option value="">Choose a request...</option>
                                {stories.map(s => (
                                    <option key={s.instruction_id} value={s.instruction_id}>{s.title || s.instruction_id}</option>
                                ))}
                            </select>
                        </div>

                        <div className="form-group">
                            <label className="form-label">What kind of feedback?</label>
                            <div className="type-grid" style={{gridTemplateColumns:'repeat(auto-fit, minmax(120px, 1fr))'}}>
                                {feedbackTypes.map(t => (
                                    <div key={t.v} className={`type-card ${feedbackType === t.v ? 'selected' : ''}`} onClick={() => setFeedbackType(t.v)} style={{padding:12}}>
                                        <div style={{fontSize:18,marginBottom:2}}>{t.icon}</div>
                                        <div style={{fontSize:13,fontWeight:600}}>{t.l}</div>
                                        <div style={{fontSize:11,color:'#64748b',marginTop:2}}>{t.d}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="form-group">
                            <label className="form-label">Your message</label>
                            <textarea className="form-textarea" placeholder="Tell the agent what to do differently..." value={message} onChange={e => setMessage(e.target.value)} />
                        </div>

                        <button type="submit" className="btn btn-primary btn-full" disabled={submitting}>
                            {submitting ? 'Sending...' : '📨 Send Feedback'}
                        </button>
                    </form>

                    {selectedStory && (
                        <div>
                            <div className="section-title">Previous Feedback</div>
                            {history.length === 0 ? (
                                <div style={{textAlign:'center',color:'#94a3b8',padding:24}}>No feedback sent for this request yet.</div>
                            ) : history.map((fb, i) => (
                                <div key={i} className="card">
                                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                                        <span style={{fontWeight:600,textTransform:'capitalize',color:'#6366f1',fontSize:13}}>{fb.feedback_type}</span>
                                        <span style={{fontSize:12,color:'#94a3b8'}}>{new Date(fb.created_at).toLocaleString()}</span>
                                    </div>
                                    <div style={{color:'#334155',fontSize:14}}>{fb.message}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div></div>
            );
        }

        /* ══════════════════════════════════════════════════════════
           PROJECTS PAGE
           ══════════════════════════════════════════════════════════ */
        function ProjectsPage({ showToast }) {
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editProject, setEditProject] = useState(null);
            const [name, setName] = useState('');
            const [description, setDescription] = useState('');
            const [color, setColor] = useState('#6366f1');

            const colors = ['#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#06b6d4'];

            const loadProjects = async () => {
                try {
                    setLoading(true);
                    const data = await apiCall('GET', '/projects');
                    setProjects(data);
                } catch { showToast('Error', 'Failed to load projects', 'error'); }
                finally { setLoading(false); }
            };
            useEffect(() => { loadProjects(); }, []);

            const openCreate = () => { setEditProject(null); setName(''); setDescription(''); setColor('#6366f1'); setShowModal(true); };
            const openEdit = (proj) => { setEditProject(proj); setName(proj.name); setDescription(proj.description || ''); setColor(proj.color || '#6366f1'); setShowModal(true); };

            const handleSave = async () => {
                if (!name.trim()) { showToast('Missing Info', 'Please enter a project name', 'error'); return; }
                try {
                    if (editProject) {
                        await apiCall('PUT', `/projects/${editProject.id}`, { name, description, color });
                        showToast('Updated', `Project "${name}" updated`, 'success');
                    } else {
                        await apiCall('POST', '/projects', { name, description, color });
                        showToast('Created', `Project "${name}" created`, 'success');
                    }
                    setShowModal(false);
                    loadProjects();
                } catch { showToast('Error', 'Failed to save project', 'error'); }
            };

            const handleDelete = async (proj) => {
                if (!confirm(`Delete project "${proj.name}"? Requests in this project will become unassigned.`)) return;
                try {
                    await apiCall('DELETE', `/projects/${proj.id}`);
                    showToast('Deleted', `Project "${proj.name}" deleted`, 'success');
                    loadProjects();
                } catch { showToast('Error', 'Failed to delete project', 'error'); }
            };

            return (
                <div className="content"><div className="content-inner">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                            <div className="page-title">Projects</div>
                            <div className="page-subtitle">Organize your requests into projects</div>
                        </div>
                        <button className="btn btn-primary" onClick={openCreate}>+ New Project</button>
                    </div>

                    {loading ? (
                        <div style={{marginTop:24}}>
                            <div className="skeleton skeleton-card" style={{height:120}}></div>
                            <div className="skeleton skeleton-card" style={{height:120}}></div>
                        </div>
                    ) : projects.length === 0 ? (
                        <div style={{textAlign:'center',padding:'60px 20px',color:'#94a3b8'}}>
                            <div style={{fontSize:48,marginBottom:12}}>📁</div>
                            <div style={{fontSize:16,fontWeight:500,color:'#64748b'}}>No projects yet</div>
                            <div style={{fontSize:14,marginTop:4}}>Create a project to start organizing your requests</div>
                            <button className="btn btn-primary" style={{marginTop:16}} onClick={openCreate}>+ Create Your First Project</button>
                        </div>
                    ) : (
                        <div className="project-grid">
                            {projects.map(proj => (
                                <div key={proj.id} className="project-card">
                                    <div className="project-card-stripe" style={{background:proj.color || '#6366f1'}}></div>
                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                                        <div className="project-card-name">{proj.name}</div>
                                        <div style={{display:'flex',gap:4}}>
                                            <button className="btn btn-secondary btn-sm" onClick={() => openEdit(proj)} style={{padding:'4px 8px',fontSize:11}}>Edit</button>
                                            <button className="btn btn-danger btn-sm" onClick={() => handleDelete(proj)} style={{padding:'4px 8px',fontSize:11}}>Delete</button>
                                        </div>
                                    </div>
                                    {proj.description && <div className="project-card-desc">{proj.description}</div>}
                                    <div className="project-card-meta">
                                        <span>{proj.request_count} request{proj.request_count !== 1 ? 's' : ''}</span>
                                        <span>Created {new Date(proj.created_at).toLocaleDateString()}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {showModal && (
                        <div className="project-modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="project-modal" onClick={e => e.stopPropagation()}>
                                <h3>{editProject ? 'Edit Project' : 'New Project'}</h3>
                                <div className="form-group">
                                    <label className="form-label">Project Name</label>
                                    <input type="text" className="form-input" placeholder="e.g., Mobile App, Backend API" value={name} onChange={e => setName(e.target.value)} autoFocus />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Description</label>
                                    <textarea className="form-textarea" placeholder="What is this project about?" value={description} onChange={e => setDescription(e.target.value)} style={{minHeight:80}} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Color</label>
                                    <div className="color-picker">
                                        {colors.map(c => (
                                            <div key={c} className={`color-swatch ${color === c ? 'selected' : ''}`} style={{background:c}} onClick={() => setColor(c)}></div>
                                        ))}
                                    </div>
                                </div>
                                <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
                                    <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Cancel</button>
                                    <button className="btn btn-primary" onClick={handleSave}>{editProject ? 'Save Changes' : 'Create Project'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div></div>
            );
        }

        /* ══════════════════════════════════════════════════════════
           APP SHELL
           ══════════════════════════════════════════════════════════ */
        function App() {
            const [page, setPage] = useState('submit');
            const [connStatus, setConnStatus] = useState(true);
            const [stats, setStats] = useState({ active_stories: 0, pending_approvals: 0 });
            const [currentUser, setCurrentUser] = useState(null);
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            const { toasts, showToast } = useToast();

            // Load current user
            useEffect(() => {
                fetch('/auth/me', { credentials: 'include' })
                    .then(r => r.ok ? r.json() : null)
                    .then(u => { if (u) setCurrentUser(u); })
                    .catch(() => {});
            }, []);

            useEffect(() => {
                const check = async () => { try { setConnStatus((await fetch('/health')).ok); } catch { setConnStatus(false); } };
                check(); const iv = setInterval(check, 10000); return () => clearInterval(iv);
            }, []);

            useEffect(() => {
                const load = async () => { try { setStats(await apiCall('GET', '/dashboard')); } catch {} };
                load(); const iv = setInterval(load, 30000); return () => clearInterval(iv);
            }, []);

            const handleLogout = async () => {
                try {
                    await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
                } catch {}
                window.location.href = '/login';
            };

            const navItems = [
                { key: 'submit', icon: '✨', label: 'New Request' },
                { key: 'projects', icon: '📁', label: 'Projects' },
                { key: 'dashboard', icon: '📊', label: 'Stats' },
                { key: 'stories', icon: '📂', label: 'My Requests' },
                { key: 'approvals', icon: '🔔', label: 'Review & Approve', badge: stats.pending_approvals },
                { key: 'activity', icon: '📋', label: 'Activity Log' },
                { key: 'feedback', icon: '💬', label: 'Send Feedback' }
            ];

            return (
                <>
                    <div className="header">
                        <div className="header-left">
                            <div className="logo">
                                <div className="logo-icon">D</div>
                                DevAgent
                            </div>
                            <div className="connection-badge">
                                <div className={`conn-dot ${connStatus ? '' : 'offline'}`} />
                                {connStatus ? 'Connected' : 'Offline'}
                            </div>
                        </div>
                        <div className="header-right">
                            <div className="header-stat">📂 Active: <strong>{stats.active_stories || 0}</strong></div>
                            <div className="header-stat">
                                🔔 Approvals:
                                {stats.pending_approvals > 0 ? <span className="notif-badge">{stats.pending_approvals}</span> : <strong>0</strong>}
                            </div>
                            {currentUser && (
                                <div style={{position:'relative',marginLeft:8}}>
                                    <div onClick={() => setUserMenuOpen(!userMenuOpen)} style={{
                                        display:'flex',alignItems:'center',gap:8,cursor:'pointer',
                                        padding:'4px 10px',borderRadius:8,background:userMenuOpen?'#f1f5f9':'transparent',
                                        transition:'background 0.15s'
                                    }}>
                                        {currentUser.avatar_url ? (
                                            <img src={currentUser.avatar_url} alt="" style={{width:28,height:28,borderRadius:'50%',objectFit:'cover'}} />
                                        ) : (
                                            <div style={{width:28,height:28,borderRadius:'50%',background:'#6366f1',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}}>
                                                {(currentUser.display_name || currentUser.email || '?')[0].toUpperCase()}
                                            </div>
                                        )}
                                        <span style={{fontSize:13,fontWeight:500,color:'#334155',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                                            {currentUser.display_name || currentUser.email}
                                        </span>
                                        <span style={{fontSize:10,color:'#94a3b8'}}>▼</span>
                                    </div>
                                    {userMenuOpen && (
                                        <div style={{
                                            position:'absolute',right:0,top:'100%',marginTop:4,
                                            background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,
                                            boxShadow:'0 4px 12px rgba(0,0,0,0.08)',minWidth:200,zIndex:100,
                                            overflow:'hidden'
                                        }}>
                                            <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9'}}>
                                                <div style={{fontSize:13,fontWeight:600,color:'#0f172a'}}>{currentUser.display_name}</div>
                                                <div style={{fontSize:12,color:'#64748b'}}>{currentUser.email}</div>
                                                <div style={{fontSize:11,color:'#94a3b8',marginTop:2,textTransform:'capitalize'}}>
                                                    via {currentUser.provider}
                                                </div>
                                            </div>
                                            <div onClick={handleLogout} style={{
                                                padding:'10px 16px',cursor:'pointer',fontSize:13,color:'#ef4444',
                                                display:'flex',alignItems:'center',gap:8,
                                                transition:'background 0.15s'
                                            }}
                                            onMouseEnter={e => e.currentTarget.style.background='#fef2f2'}
                                            onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                                                🚪 Sign Out
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="main-layout">
                        <div className="sidebar">
                            <div className="sidebar-section-label">Menu</div>
                            {navItems.map(n => (
                                <div key={n.key} className={`nav-item ${page === n.key ? 'active' : ''}`} onClick={() => setPage(n.key)}>
                                    <span className="nav-icon">{n.icon}</span>
                                    <span>{n.label}</span>
                                    {n.badge > 0 && <span className="nav-badge">{n.badge}</span>}
                                </div>
                            ))}
                        </div>

                        {page === 'dashboard' && <DashboardPage showToast={showToast} onNavigate={setPage} />}
                        {page === 'submit' && <NewRequestPage showToast={showToast} />}
                        {page === 'projects' && <ProjectsPage showToast={showToast} />}
                        {page === 'stories' && <MyRequestsPage showToast={showToast} />}
                        {page === 'approvals' && <ApprovalsPage showToast={showToast} />}
                        {page === 'activity' && <ActivityPage showToast={showToast} />}
                        {page === 'feedback' && <FeedbackPage showToast={showToast} />}
                    </div>

                    <ToastContainer toasts={toasts} />
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
