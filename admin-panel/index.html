            const stateColors = { 'RECEIVED': 'badge-blue', 'ANALYZING': 'badge-yellow', 'CODING': 'badge-purple', 'TESTING': 'badge-orange', 'DONE': 'badge-green', 'FAILED': 'badge-red' };

            let filtered = stories;
            if (filter === 'active') filtered = stories.filter(s => s.state !== 'DONE' && s.state !== 'FAILED');
            else if (filter === 'done') filtered = stories.filter(s => s.state === 'DONE');
            else if (filter === 'failed') filtered = stories.filter(s => s.state === 'FAILED');

            const filterOpts = [
                { key: 'all', label: 'All', count: stories.length },
                { key: 'active', label: 'Active', count: stories.filter(s => s.state !== 'DONE' && s.state !== 'FAILED').length },
                { key: 'done', label: 'Done', count: stories.filter(s => s.state === 'DONE').length },
                { key: 'failed', label: 'Failed', count: stories.filter(s => s.state === 'FAILED').length }
            ];

            return (
                <div className="page-fade">
                    <div className="page-header">
                        <h1 className="page-title">Stories</h1>
                        <p className="page-subtitle">View and manage all development stories</p>
                    </div>

                    <div className="filter-tabs">
                        {filterOpts.map(opt => (
                            <button key={opt.key} className={`filter-tab ${filter === opt.key ? 'active' : ''}`} onClick={() => setFilter(opt.key)}>
                                {opt.label} ({opt.count})
                            </button>
                        ))}
                    </div>

                    {filtered.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-state-icon">{Icons.stories}</div>
                            <div className="empty-state-title">No stories found</div>
                            <div className="empty-state-text">{filter === 'all' ? 'No stories have been submitted yet.' : 'No stories match this filter.'}</div>
                        </div>
                    ) : filtered.map(story => (
                        <div key={story.id} className={`story-item state-${story.state.toLowerCase()}`}>
                            <div className="story-info">
                                <div className="story-id">Story #{story.id}</div>
                                <div className="story-desc">{story.description || 'No description'}</div>
                                <div className="story-meta">
                                    {new Date(story.created_at).toLocaleString()}
                                    {story.updated_at && ` \u00b7 Updated ${new Date(story.updated_at).toLocaleString()}`}
                                </div>
                            </div>
                            <span className={`badge ${stateColors[story.state] || 'badge-blue'}`}>{story.state}</span>
                        </div>
                    ))}
                </div>
            );
        };

        /* ═══════════════════════════════════════════════════════
           AUTHENTICATION
           ═══════════════════════════════════════════════════════ */
        const Authentication = () => {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showCreate, setShowCreate] = useState(false);
            const [creating, setCreating] = useState(false);
            const [newUser, setNewUser] = useState({ email: '', password: '', display_name: '', role: 'admin' });
            const [actionLoading, setActionLoading] = useState(null);

            const loadUsers = () => {
                api.get('/auth/admin/auth/users')
                    .then(data => setUsers(data.users || []))
                    .catch(() => window.showToast('Failed to load users', 'error'))
                    .finally(() => setLoading(false));
            };

            useEffect(() => { loadUsers(); }, []);

            const handleCreate = async () => {
                if (!newUser.email || !newUser.password || newUser.password.length < 8) {
                    window.showToast('Email and password (min 8 chars) are required', 'error');
                    return;
                }
                setCreating(true);
                try {
                    await api.post('/auth/admin/auth/users', newUser);
                    window.showToast('User created successfully', 'success');
                    setShowCreate(false);
                    setNewUser({ email: '', password: '', display_name: '', role: 'admin' });
                    setLoading(true);
                    loadUsers();
                } catch (e) {
                    window.showToast(e.message || 'Failed to create user', 'error');
                } finally {
                    setCreating(false);
                }
            };

            const toggleActive = async (user) => {
                setActionLoading(user.id);
                try {
                    await api.put(`/auth/admin/auth/users/${user.id}/active`, { active: !user.active });
                    window.showToast(`User ${user.active ? 'deactivated' : 'activated'}`, 'success');
                    setLoading(true);
                    loadUsers();
                } catch (e) {
                    window.showToast(e.message || 'Failed to update user', 'error');
                } finally {
                    setActionLoading(null);
                }
            };

            const changeRole = async (user, newRole) => {
                setActionLoading(user.id);
                try {
                    await api.put(`/auth/admin/auth/users/${user.id}/role`, { role: newRole });
                    window.showToast(`Role updated to ${newRole}`, 'success');
                    setLoading(true);
                    loadUsers();
                } catch (e) {
                    window.showToast(e.message || 'Failed to update role', 'error');
                } finally {
                    setActionLoading(null);
                }
            };

            const deleteUser = async (user) => {
                if (!confirm(`Delete user ${user.email}? This cannot be undone.`)) return;
                setActionLoading(user.id);
                try {
                    await api.del(`/auth/admin/auth/users/${user.id}`);
                    window.showToast('User deleted', 'success');
                    setLoading(true);
                    loadUsers();
                } catch (e) {
                    window.showToast(e.message || 'Failed to delete user', 'error');
                } finally {
                    setActionLoading(null);
                }
            };

            const roleBadge = (roles) => {
                const primary = (roles && roles[0]) || 'user';
                const colors = { admin: 'badge-purple', user: 'badge-blue', viewer: 'badge-gray' };
                return <span className={`badge ${colors[primary] || 'badge-blue'}`}>{primary}</span>;
            };

            if (loading) return <SkeletonLoader />;

            return (
                <div className="page-fade">
                    <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                        <div>
                            <h1 className="page-title">Authentication</h1>
                            <p className="page-subtitle">Manage users and access control</p>
                        </div>
                        <button className="btn btn-primary" onClick={() => setShowCreate(!showCreate)}>
                            {showCreate ? 'Cancel' : '+ Add User'}
                        </button>
                    </div>

                    {showCreate && (
                        <div className="card" style={{marginBottom: '1.5rem'}}>
                            <div className="card-header"><h3 className="card-title">Create New User</h3></div>
                            <div className="card-body">
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                                    <div className="form-group">
                                        <label className="form-label">Email *</label>
                                        <input className="form-input" type="email" placeholder="user@example.com"
                                            value={newUser.email} onChange={e => setNewUser({...newUser, email: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Display Name</label>
                                        <input className="form-input" type="text" placeholder="John Doe"
                                            value={newUser.display_name} onChange={e => setNewUser({...newUser, display_name: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Password * <span style={{color:'var(--text-muted)',fontWeight:400}}>(min 8 characters)</span></label>
                                        <input className="form-input" type="password" placeholder="••••••••"
                                            value={newUser.password} onChange={e => setNewUser({...newUser, password: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Role</label>
                                        <select className="form-select" value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})}>
                                            <option value="admin">Admin</option>
                                            <option value="user">User</option>
                                            <option value="viewer">Viewer</option>
                                        </select>
                                    </div>
                                </div>
                                <div style={{marginTop:'1rem',display:'flex',justifyContent:'flex-end'}}>
                                    <button className="btn btn-primary" onClick={handleCreate} disabled={creating}>
                                        {creating ? 'Creating...' : 'Create User'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {users.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-state-icon">{Icons.auth}</div>
                            <div className="empty-state-title">No registered users</div>
                            <div className="empty-state-text">Click "Add User" above or users will appear here once they register or log in via OAuth.</div>
                        </div>
                    ) : (
                        <div className="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>User</th>
                                        <th>Email</th>
                                        <th>Provider</th>
                                        <th>Role</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th style={{textAlign:'right'}}>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {users.map(user => (
                                        <tr key={user.id} style={{opacity: actionLoading === user.id ? 0.5 : 1}}>
                                            <td style={{fontWeight: 500, color: 'var(--text-primary)'}}>
                                                <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
                                                    {user.avatar_url ? (
                                                        <img src={user.avatar_url} alt="" style={{width:28,height:28,borderRadius:'50%'}} />
                                                    ) : (
                                                        <div style={{width:28,height:28,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'0.75rem',fontWeight:600}}>
                                                            {(user.display_name || user.email || '?')[0].toUpperCase()}
                                                        </div>
                                                    )}
                                                    {user.display_name || user.email.split('@')[0]}
                                                </div>
                                            </td>
                                            <td>{user.email}</td>
                                            <td><span className="badge badge-gray">{user.provider || 'local'}</span></td>
                                            <td>
                                                <select className="form-select" style={{padding:'0.25rem 0.5rem',fontSize:'0.8rem',minWidth:'auto',width:'auto'}}
                                                    value={(user.roles && user.roles[0]) || 'user'}
                                                    onChange={e => changeRole(user, e.target.value)}
                                                    disabled={actionLoading === user.id}>
                                                    <option value="admin">admin</option>
                                                    <option value="user">user</option>
                                                    <option value="viewer">viewer</option>
                                                </select>
                                            </td>
                                            <td>
                                                <span className={`badge ${user.active ? 'badge-green' : 'badge-red'}`} style={{cursor:'pointer'}} onClick={() => toggleActive(user)}>
                                                    <span className={`badge-dot ${user.active ? 'green' : 'red'}`}></span>
                                                    {user.active ? 'Active' : 'Inactive'}
                                                </span>
                                            </td>
                                            <td>{user.created_at ? new Date(user.created_at).toLocaleDateString() : '—'}</td>
                                            <td style={{textAlign:'right'}}>
                                                <button className="btn btn-sm" style={{color:'var(--error)',background:'none',border:'1px solid var(--error)',padding:'0.25rem 0.5rem',fontSize:'0.75rem',borderRadius:'6px',cursor:'pointer'}}
                                                    onClick={() => deleteUser(user)} disabled={actionLoading === user.id}>
                                                    Delete
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        /* ═══════════════════════════════════════════════════════
           ENVIRONMENT / SERVER SETTINGS
           ═══════════════════════════════════════════════════════ */
        const EnvironmentSettings = () => {
            const [serverConfig, setServerConfig] = useState(null);
            const [projectConfig, setProjectConfig] = useState(null);
            const [loading, setLoading] = useState(true);
            const [savingServer, setSavingServer] = useState(false);
            const [savingProject, setSavingProject] = useState(false);
            const [restartBanner, setRestartBanner] = useState(false);

            useEffect(() => {
                Promise.all([
                    api.get('/api/v1/admin/config/server'),
                    api.get('/api/v1/admin/config/project')
                ]).then(([s, p]) => {
                    setServerConfig(s);
                    setProjectConfig(p);
                }).catch(() => window.showToast('Failed to load environment settings', 'error'))
                .finally(() => setLoading(false));
            }, []);

            const handleServerChange = (field, value) => setServerConfig(prev => ({ ...prev, [field]: value }));
            const handleProjectChange = (field, value) => setProjectConfig(prev => ({ ...prev, [field]: value }));

            const handleSaveServer = async () => {
                try {
                    setSavingServer(true);
                    const result = await api.put('/api/v1/admin/config/server', serverConfig);
                    window.showToast('Server settings saved', 'success');
                    if (result.restart_required) setRestartBanner(true);
                } catch (err) { window.showToast(err?.message || 'Failed to save', 'error'); }
                finally { setSavingServer(false); }
            };

            const handleSaveProject = async () => {
                try {
                    setSavingProject(true);
                    await api.put('/api/v1/admin/config/project', projectConfig);
                    window.showToast('Project settings saved', 'success');
                } catch (err) { window.showToast(err?.message || 'Failed to save', 'error'); }
                finally { setSavingProject(false); }
            };

            if (loading) return <SkeletonLoader />;

            return (
                <div className="page-fade">
                    <div className="page-header">
                        <h1 className="page-title">Environment</h1>
                        <p className="page-subtitle">Server, project, and runtime settings — replaces .env file configuration</p>
                    </div>

                    {restartBanner && (
                        <div className="callout" style={{borderLeftColor: 'var(--warning)', background: 'var(--warning-bg)', marginBottom: '1.25rem'}}>
                            <div className="callout-title" style={{color: 'var(--warning)'}}>Restart Required</div>
                            <div className="callout-text">Some changes (ports, CORS, DB path) require a server restart to take effect.</div>
                        </div>
                    )}

                    {/* Server Settings */}
                    {serverConfig && (
                        <div className="card">
                            <div style={{display: 'flex', alignItems: 'center', gap: '0.6rem', marginBottom: '1.25rem'}}>
                                <span style={{color: 'var(--accent-light)'}}>{Icons.server}</span>
                                <div>
                                    <div style={{fontSize: '0.95rem', fontWeight: 600}}>Server Settings</div>
                                    <div style={{fontSize: '0.72rem', color: 'var(--text-dim)'}}>Runtime, network, and database configuration</div>
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">Log Level</label>
                                    <select className="form-select" value={serverConfig.log_level || 'info'} onChange={e => handleServerChange('log_level', e.target.value)}>
                                        <option value="debug">Debug</option>
                                        <option value="info">Info</option>
                                        <option value="warning">Warning</option>
                                        <option value="error">Error</option>
                                        <option value="critical">Critical</option>
                                    </select>
                                    <span className="form-helper">Controls verbosity of server logs (AGENT_LOG_LEVEL)</span>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Config File</label>
                                    <input type="text" className="form-input" value={serverConfig.config_file || '.agent.json'} onChange={e => handleServerChange('config_file', e.target.value)} placeholder=".agent.json" />
                                    <span className="form-helper">Path to config file (AGENT_CONFIG_FILE)</span>
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">API Port</label>
                                    <input type="number" className="form-input" value={serverConfig.api_port ?? 3000} onChange={e => handleServerChange('api_port', parseInt(e.target.value))} placeholder="3000" />
                                    <span className="form-helper">Main API server port (AGENT_PORT) — restart required</span>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Admin Port</label>
                                    <input type="number" className="form-input" value={serverConfig.admin_port ?? 3001} onChange={e => handleServerChange('admin_port', parseInt(e.target.value))} placeholder="3001" />
                                    <span className="form-helper">Admin panel port (AGENT_ADMIN_PORT) — restart required</span>
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">CORS Origins</label>
                                    <input type="text" className="form-input" value={serverConfig.cors_origins || ''} onChange={e => handleServerChange('cors_origins', e.target.value)} placeholder="http://localhost:3000, http://localhost:3001" />
                                    <span className="form-helper">Comma-separated allowed origins (AGENT_CORS_ORIGINS) — restart required</span>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Admin DB Path</label>
                                    <input type="text" className="form-input" value={serverConfig.admin_db_path || '.agent_admin.db'} onChange={e => handleServerChange('admin_db_path', e.target.value)} placeholder=".agent_admin.db" />
                                    <span className="form-helper">SQLite database for keys and auth (AGENT_ADMIN_DB_PATH) — restart required</span>
                                </div>
                            </div>

                            <button className="btn btn-primary" onClick={handleSaveServer} disabled={savingServer} style={{marginTop: '0.25rem'}}>
                                {savingServer ? 'Saving...' : 'Save Server Settings'}
                            </button>
                        </div>
                    )}

                    {/* Project Settings */}
                    {projectConfig && (
                        <div className="card">
                            <div style={{display: 'flex', alignItems: 'center', gap: '0.6rem', marginBottom: '1.25rem'}}>
                                <span style={{color: 'var(--accent-light)'}}>{Icons.project}</span>
                                <div>
                                    <div style={{fontSize: '0.95rem', fontWeight: 600}}>Project Settings</div>
                                    <div style={{fontSize: '0.72rem', color: 'var(--text-dim)'}}>Repository and language configuration</div>
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">Project ID</label>
                                    <input type="text" className="form-input" value={projectConfig.project_id || 'default'} onChange={e => handleProjectChange('project_id', e.target.value)} placeholder="default" />
                                    <span className="form-helper">Unique identifier for this project (AGENT_PROJECT_ID)</span>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Project Directory</label>
                                    <input type="text" className="form-input" value={projectConfig.project_dir || '.'} onChange={e => handleProjectChange('project_dir', e.target.value)} placeholder="." />
                                    <span className="form-helper">Root directory of the project (AGENT_PROJECT_DIR)</span>
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">Language</label>
                                    <select className="form-select" value={projectConfig.language || 'python'} onChange={e => handleProjectChange('language', e.target.value)}>
                                        <option value="python">Python</option>
                                        <option value="javascript">JavaScript</option>
                                        <option value="typescript">TypeScript</option>
                                        <option value="go">Go</option>
                                        <option value="rust">Rust</option>
                                        <option value="java">Java</option>
                                    </select>
                                    <span className="form-helper">Primary language (AGENT_LANGUAGE)</span>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Framework</label>
                                    <input type="text" className="form-input" value={projectConfig.framework || ''} onChange={e => handleProjectChange('framework', e.target.value)} placeholder="e.g., fastapi, react, django" />
                                    <span className="form-helper">Optional framework name (AGENT_FRAMEWORK)</span>
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label">Base Branch</label>
                                    <input type="text" className="form-input" value={projectConfig.base_branch || 'main'} onChange={e => handleProjectChange('base_branch', e.target.value)} placeholder="main" />
                                    <span className="form-helper">Default git branch (AGENT_BASE_BRANCH)</span>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Test Framework</label>
                                    <input type="text" className="form-input" value={projectConfig.test_framework || ''} onChange={e => handleProjectChange('test_framework', e.target.value)} placeholder="e.g., pytest, jest, go test" />
                                    <span className="form-helper">Testing framework (AGENT_TEST_FRAMEWORK)</span>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Package Manager</label>
                                    <input type="text" className="form-input" value={projectConfig.package_manager || ''} onChange={e => handleProjectChange('package_manager', e.target.value)} placeholder="e.g., pip, npm, yarn, cargo" />
                                    <span className="form-helper">Package manager (AGENT_PACKAGE_MANAGER)</span>
                                </div>
                            </div>

                            <button className="btn btn-primary" onClick={handleSaveProject} disabled={savingProject} style={{marginTop: '0.25rem'}}>
                                {savingProject ? 'Saving...' : 'Save Project Settings'}
                            </button>
                        </div>
                    )}

                    {/* Info callout */}
                    <div className="callout" style={{marginTop: '0.5rem'}}>
                        <div className="callout-title">About Environment Settings</div>
                        <div className="callout-text">
                            These settings replace the <code style={{background: 'var(--bg-overlay)', padding: '0.1rem 0.3rem', borderRadius: '3px', fontSize: '0.78rem'}}>.env</code> file.
                            All changes are persisted to <code style={{background: 'var(--bg-overlay)', padding: '0.1rem 0.3rem', borderRadius: '3px', fontSize: '0.78rem'}}>.agent.json</code> automatically.
                            API keys are managed separately on the LLM Providers page and stored securely in the admin database.
                        </div>
                    </div>
                </div>
            );
        };

        /* ═══════════════════════════════════════════════════════
           ADMIN PANEL (MAIN)
           ═══════════════════════════════════════════════════════ */
        const AdminPanel = () => {
            const [sidebarMini, setSidebarMini] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('dashboard');
            const [currentUser, setCurrentUser] = useState(_currentUser);
            const [loggingOut, setLoggingOut] = useState(false);
            const [cmdOpen, setCmdOpen] = useState(false);

            useEffect(() => {
                if (_currentUser) setCurrentUser(_currentUser);
                const handler = (e) => setCurrentUser(e.detail);
                window.addEventListener('userLoaded', handler);
                return () => window.removeEventListener('userLoaded', handler);
            }, []);

            useEffect(() => {
                window._setActiveSection = setActiveSection;
                return () => { window._setActiveSection = null; };
            }, []);

            // Keyboard shortcut: Cmd+K
            useEffect(() => {
                const handler = (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setCmdOpen(o => !o); }
                    if (e.key === 'Escape') setCmdOpen(false);
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);

            const handleLogout = async () => {
                try {
                    setLoggingOut(true);
                    if (currentUser?.provider !== 'api_token') {
                        await fetch('/auth/logout?context=admin', { method: 'POST', credentials: 'include' });
                    }
                } catch {}
                window.location.href = '/login?redirect=/admin';
            };

            const sections = {
                dashboard: { label: 'Dashboard', component: Dashboard, icon: Icons.dashboard, section: 'Overview' },
                environment: { label: 'Environment', component: EnvironmentSettings, icon: Icons.server, section: 'Configuration' },
                project: { label: 'Project', component: ProjectSettings, icon: Icons.project, section: 'Configuration' },
                llm: { label: 'LLM Providers', component: LLMProviders, icon: Icons.llm, section: 'Configuration' },
                routing: { label: 'Routing', component: ModelRouting, icon: Icons.routing, section: 'Configuration' },
                cost: { label: 'Cost & Budgets', component: CostBudgets, icon: Icons.cost, section: 'Configuration' },
                safety: { label: 'Safety', component: SafetyApprovals, icon: Icons.safety, section: 'Configuration' },
                quality: { label: 'Quality Gates', component: QualityGates, icon: Icons.quality, section: 'Configuration' },
                observability: { label: 'Observability', component: Observability, icon: Icons.observability, section: 'Configuration' },
                stories: { label: 'Stories', component: Stories, icon: Icons.stories, section: 'Operations' },
                auth: { label: 'Auth & Users', component: Authentication, icon: Icons.auth, section: 'Access' }
            };

            const navSections = [
                { label: 'Overview', items: ['dashboard'] },
                { label: 'Configuration', items: ['environment', 'project', 'llm', 'routing', 'cost', 'safety', 'quality', 'observability'] },
                { label: 'Operations', items: ['stories'] },
                { label: 'Access', items: ['auth'] }
            ];

            const CurrentComponent = sections[activeSection]?.component || Dashboard;
            const userInitials = currentUser ? (currentUser.display_name || currentUser.name || currentUser.email || '?').charAt(0).toUpperCase() : '?';

            return (
                <div className="app-container">
                    {/* Mobile Backdrop */}
                    <div className={`mobile-backdrop ${mobileOpen ? 'show' : ''}`} onClick={() => setMobileOpen(false)}></div>

                    {/* Sidebar */}
                    <div className={`sidebar ${sidebarMini ? 'mini' : ''} ${mobileOpen ? 'mobile-open' : ''}`}>
                        <div className="sidebar-toggle" onClick={() => setSidebarMini(!sidebarMini)} title={sidebarMini ? 'Expand' : 'Collapse'}>
                            {sidebarMini ? Icons.chevronRight : Icons.chevronLeft}
                        </div>

                        <div className="sidebar-header">
                            <div className="sidebar-brand-icon">A</div>
                            <div className="sidebar-brand-text">
                                <div>Auto-Dev</div>
                                <div className="sidebar-brand-sub">Admin Panel</div>
                            </div>
                        </div>

                        <nav className="sidebar-nav">
                            {navSections.map(section => (
                                <div key={section.label} className="nav-section">
                                    <div className="nav-section-label">{section.label}</div>
                                    {section.items.map(key => (
                                        <div
                                            key={key}
                                            className={`nav-item ${activeSection === key ? 'active' : ''}`}
                                            onClick={() => { setActiveSection(key); setMobileOpen(false); }}
                                            title={sidebarMini ? sections[key].label : undefined}
                                        >
                                            <span className="nav-icon">{sections[key].icon}</span>
                                            <span className="nav-label">{sections[key].label}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </nav>

                        <div className="sidebar-footer">
                            <span style={{opacity: 0.5}}>v1.0.0</span>
                            <span className="sidebar-footer-text" style={{marginLeft: 'auto', opacity: 0.4}}>Auto-Dev Agent</span>
                        </div>
                    </div>

                    {/* Main */}
                    <div className="main-content">
                        <header className="header">
                            <div className="header-left">
                                <button className="btn btn-ghost mobile-toggle" onClick={() => setMobileOpen(!mobileOpen)} style={{padding: '0.4rem'}}>
                                    {Icons.menu}
                                </button>
                                <div>
                                    <div className="header-title">{sections[activeSection]?.label}</div>
                                    <div className="header-breadcrumb">
                                        <span>Admin</span>
                                        <span className="header-breadcrumb-sep">/</span>
                                        <span style={{color: 'var(--text-secondary)'}}>{sections[activeSection]?.label}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="header-right">
                                <div className="header-search" onClick={() => setCmdOpen(true)}>
                                    {Icons.search}
                                    <span>Search...</span>
                                    <kbd>{navigator.platform?.includes('Mac') ? '\u2318' : 'Ctrl'}+K</kbd>
                                </div>

                                <div className="user-menu" onClick={handleLogout} title={loggingOut ? 'Logging out...' : 'Click to logout'} style={{opacity: loggingOut ? 0.5 : 1}}>
                                    <div className="user-avatar">{userInitials}</div>
                                    <span className="user-name">{currentUser?.display_name || currentUser?.name || currentUser?.email || 'Admin'}</span>
                                    <span style={{color: 'var(--text-dim)'}}>{Icons.logout}</span>
                                </div>
                            </div>
                        </header>

                        <div className="content-area">
                            <CurrentComponent key={activeSection} />
                        </div>
                    </div>

                    {/* Command Palette */}
                    <CommandPalette isOpen={cmdOpen} onClose={() => setCmdOpen(false)} onNavigate={setActiveSection} sections={sections} />

                    <ToastManager />
                </div>
            );
        };

        ReactDOM.render(<AdminPanel />, document.getElementById('root'));
    </script>
</body>
</html>
